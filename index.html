<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー登録</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
    div { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="text"], input[type="email"] { width: 100%; padding: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #06C755; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; }
    button:disabled { background-color: #ccc; }
    
    /* 状態表示用エリアのスタイル */
    #loadingArea, #registeredArea { text-align: center; padding: 20px 0; font-size: 16px; }
    #registeredArea { color: #06C755; font-weight: bold; display: none; }
    #registrationForm { display: none; } /* 最初はフォームを隠しておく */
    #status { margin-top: 15px; font-weight: bold; text-align: center; }
  </style>
</head>
<body>

  <h2>ユーザー登録</h2>
  
  <div id="loadingArea">
    登録状態を確認しています...<br>しばらくお待ちください。
  </div>

  <div id="registeredArea">
    <p>✓ すでにユーザー登録されています。</p>
    <p style="font-size: 14px; color: #666; font-weight: normal;">ご利用ありがとうございます。<br>このウインドウを閉じてサービスをご利用ください。</p>
  </div>
  
  <form id="registrationForm">
    <input type="hidden" id="lineId" name="lineId">

    <div>
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" required placeholder="山田 太郎">
    </div>

    <div>
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required placeholder="example@email.com">
    </div>

    <button type="submit" id="submitBtn">登録する</button>
  </form>

  <div id="status"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // ① あなたのLIFF ID
    const LIFF_ID = 2010743006-f1UzN8zv;
    // ② GASのウェブアプリURL
    const GAS_URL = https://script.google.com/macros/s/AKfycbzbhibmVSfJ7_R95qPymPS1AIZ-5GQwAwrQVF0eVWy4pIbwOqSy_cVzWo2PO2V-x5C-TA/exec;

    const loadingArea = document.getElementById("loadingArea");
    const registeredArea = document.getElementById("registeredArea");
    const form = document.getElementById("registrationForm");
    const statusDiv = document.getElementById("status");

    // LIFF初期化と登録検証
    async function initializeLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          const userId = profile.userId;
          document.getElementById("lineId").value = userId;
          
          // --- 【新規追加】LINE IDの登録状況をGASに検証しに行く ---
          await checkRegistrationStatus(userId);

        } else {
          liff.login();
        }
      } catch (error) {
        console.error("LIFF初期化エラー: ", error);
        loadingArea.style.display = "none";
        statusDiv.style.color = "red";
        statusDiv.innerText = "LINEアプリから開いてください。";
      }
    }

    // スプレッドシートにLINE IDが登録済みか確認する関数
    async function checkRegistrationStatus(lineId) {
      try {
        // GASのdoGetに LINE ID をパラメータとして付与し問い合わせ
        const response = await fetch(`${GAS_URL}?lineId=${lineId}`);
        const data = await response.json();

        // ローディング表示を消す
        loadingArea.style.display = "none";

        if (data.isRegistered) {
          // 登録済みの場合は「登録中画面」を表示する
          registeredArea.style.display = "block";
        } else {
          // 未登録の場合は入力フォームを表示する
          form.style.display = "block";
        }

      } catch (error) {
        console.error("検証エラー: ", error);
        loadingArea.style.display = "none";
        // 通信エラー時などは安全のためフォームを表示するか、エラーメッセージを出す
        statusDiv.style.color = "red";
        statusDiv.innerText = "情報の取得に失敗しました。ページを再読み込みしてください。";
      }
    }

    // フォーム送信時の処理
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const lineId = document.getElementById("lineId").value;
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;

      if (!lineId) {
        alert("LINE IDが取得できていません。少し待ってから再度お試しください。");
        return;
      }

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.innerText = "送信中...";
      statusDiv.innerText = "";

      const payload = { lineId, name, email };

      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        // 登録完了したらフォームを消して、登録済み画面に切り替える
        form.style.display = "none";
        registeredArea.innerHTML = "<p>✓ 登録が完了しました！</p><p style='font-size: 14px; color: #666;'>ウインドウを自動で閉じます...</p>";
        registeredArea.style.display = "block";
        
        setTimeout(() => {
          if (liff.isInClient()) {
            liff.closeWindow();
          }
        }, 3000);

      } catch (error) {
        console.error("送信エラー: ", error);
        statusDiv.style.color = "red";
        statusDiv.innerText = "送信に失敗しました。時間をおいて再度お試しください。";
        submitBtn.disabled = false;
        submitBtn.innerText = "登録する";
      }
    });

    window.addEventListener("load", initializeLiff);
  </script>
</body>
</html>
