<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー登録</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
    div { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input[type="text"], input[type="email"] { width: 100%; padding: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #06C755; color: white; border: none; border-radius: 4px; font-size: 16px; }
    #status { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>

  <h2>ユーザー登録フォーム</h2>
  
  <form id="registrationForm">
    <input type="hidden" id="lineId" name="lineId">

    <div>
      <label for="name">お名前</label>
      <input type="text" id="name" name="name" required placeholder="山田 太郎">
    </div>

    <div>
      <label for="email">メールアドレス</label>
      <input type="email" id="email" name="email" required placeholder="example@email.com">
    </div>

    <button type="submit" id="submitBtn">登録する</button>
  </form>

  <div id="status"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // ① あなたのLIFF IDに書き換えてください
    const LIFF_ID = https://liff.line.me/2010743006-f1UzN8zv;
    
    // ② コピーしたGASのウェブアプリURLに書き換えてください
    const GAS_URL = https://script.google.com/macros/s/AKfycbz0HMmpQBKtUl-jBGk9GmCMo1xwykQKf6w38P3OEQllXk_zVggoBn8TpR7BacBBh6MajA/exec;

    const statusDiv = document.getElementById("status");
    const form = document.getElementById("registrationForm");

    // LIFFの初期化とLINE IDの取得
    async function initializeLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        
        if (liff.isLoggedIn()) {
          // プロフィールを取得してLINE ID（userId）をフォームにセット
          const profile = await liff.getProfile();
          document.getElementById("lineId").value = profile.userId;
          console.log("LINE IDの取得に成功しました: ", profile.userId);
        } else {
          // LIFFブラウザ以外で開いた場合のログイン処理
          liff.login();
        }
      } catch (error) {
        console.error("LIFF初期化エラー: ", error);
        statusDiv.style.color = "red";
        statusDiv.innerText = "LINEアプリから開いてください。";
      }
    }

    // フォーム送信時の処理
    form.addEventListener("submit", async (e) => {
      e.preventDefault(); // 画面の遷移をストップ

      const lineId = document.getElementById("lineId").value;
      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;

      // LINE IDが取得できていない場合のガード
      if (!lineId) {
        alert("LINE IDが取得できていません。少し待ってから再度お試しください。");
        return;
      }

      // ボタンを無効化して二重送信を防ぐ
      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;
      submitBtn.innerText = "送信中...";
      statusDiv.innerText = "";

      // 送信データの作成
      const payload = {
        lineId: lineId,
        name: name,
        email: email
      };

      try {
        // GASへPOSTリクエストを送信
        // ※GASのWebアプリはCORSの制限があるため、mode: 'no-cors' を指定します
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        // no-cors の場合、レスポンスの中身は確認できないため、リクエスト成功＝登録完了とみなします
        form.style.display = "none";
        statusDiv.style.color = "green";
        statusDiv.innerText = "登録が完了しました！ウインドウを閉じます。";
        
        // 3秒後にLIFFウィンドウを自動で閉じる（任意）
        setTimeout(() => {
          if (liff.isInClient()) {
            liff.closeWindow();
          }
        }, 3000);

      } catch (error) {
        console.error("送信エラー: ", error);
        statusDiv.style.color = "red";
        statusDiv.innerText = "送信に失敗しました。時間をおいて再度お試しください。";
        submitBtn.disabled = false;
        submitBtn.innerText = "登録する";
      }
    });

    // ページ読み込み時にLIFFを初期化
    window.addEventListener("load", initializeLiff);
  </script>
</body>
</html>
